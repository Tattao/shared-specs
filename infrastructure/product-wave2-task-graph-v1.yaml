graph:
  id: aof-product-wave2-runtime-binding-v1
  status: product_wave2_active
  date: "2026-04-30"
  purpose: "Bind Product Wave 1 AOF contracts and UI skeletons to minimal runtime APIs without claiming release readiness."
  product_source_of_truth:
    - ../osmx/docs/plans/80-wave-execution-board.md
    - ../osmx/docs/plans/93-autonomic-operations-fabric-40-day-mvp-task-pack.md
    - ../osmx/docs/plans/94-autonomic-operations-fabric-architecture-technology-upgrade-plan.md
    - ../osmx/docs/architecture/aof-store-abstraction-v0.md
    - ../osmx/docs/reference/aof-core-contract-v0.md
  execution_source_of_truth:
    - infrastructure/product-wave2-task-pack.md
    - infrastructure/product-wave2-owner-gate.md
    - infrastructure/task-queue-v2.yaml
  hard_limits:
    owner_gate_required_before_product_code: true
    auto_merge: forbidden
    release: forbidden
    production_environment_changes: forbidden
    destructive_git_commands: forbidden
    migration_apply_without_gate: forbidden
    security_gate_closure: forbidden
    legal_gate_closure: forbidden
    shared_specs_runtime_dependency: forbidden
    hermes_product_code_write: forbidden

waves:
  - id: PRODUCT-WAVE2
    name: Runtime binding and smoke wave
    status: active
    timebox: 48-72h after Owner approval
    goal: "Replace sample-only AOF surfaces with minimal gated runtime-backed APIs, focused UI bindings, and smoke evidence."
    allowed_repos:
      - ../osmx
      - shared-specs
    forbidden_repos:
      - production environments
    exit_gate:
      - all executed tasks have changed-files, validation, residual-risks, handoff
      - no merge, release, production operation, destructive command, or human gate closure
      - migration/security/legal/release gates remain human-owned
      - wave summary proposes Product Wave 3 only from represented artifacts

task_defaults:
  status: ready_after_owner_gate
  owner: Codex
  validation_minimum:
    - git diff --check
    - targeted tests or build checks for touched area
    - artifact handoff under shared-specs
  required_artifacts:
    - changed-files.txt
    - validation.md
    - residual-risks.md
    - handoff.md

tasks:
  - id: PW2-WP0-RUNTIME-BINDING-PREFLIGHT-001
    wp: WP0
    title: Product Wave 2 runtime binding preflight
    repo: shared-specs
    priority: P0
    lane: ops
    write_scope:
      - infrastructure/artifacts/**
      - ../osmx/docs/reports/**
    forbidden_scope:
      - ../osmx/osmx-go/**
      - ../osmx/frontend/**
      - ../osmx/osmx-ai/**
    depends_on: []
    validation:
      - git diff --check
      - python3 infrastructure/runner-v2.py doctor --strict-artifacts
    acceptance:
      - Preflight records dirty worktree baseline, current validation baseline, and Product Wave 2 stop conditions.

  - id: PW2-WP2-TWIN-RUNTIME-API-001
    wp: WP2
    title: Operational Twin runtime-backed list/detail API
    repo: ../osmx
    priority: P0
    lane: backend
    write_scope:
      - osmx-go/internal/aof/**
      - osmx-go/internal/api/v1/**
      - osmx-go/internal/router/**
      - docs/reports/**
    forbidden_scope:
      - osmx-go/migrations/**
      - production config
    depends_on:
      - PW2-WP0-RUNTIME-BINDING-PREFLIGHT-001
    validation:
      - cd osmx-go && /Users/shitao/.local/go-tools/go1.25.0/bin/go test ./internal/aof/... ./internal/api/v1 ./...
    acceptance:
      - Twin list/detail API returns gated sample-runtime data matching `AofTwinNode` / `AofTwinDetail`.
      - No schema migration is introduced.

  - id: PW2-WP2-TWIN-UI-BINDING-001
    wp: WP2
    title: Bind Twin Explorer UI to runtime API
    repo: ../osmx
    priority: P1
    lane: frontend
    write_scope:
      - frontend/src/api/**
      - frontend/src/types/**
      - frontend/src/views/aof/**
      - docs/reports/**
    forbidden_scope:
      - osmx-go/migrations/**
    depends_on:
      - PW2-WP2-TWIN-RUNTIME-API-001
    validation:
      - cd frontend && npm run build:check
    acceptance:
      - "`/aof/twin` reads from the runtime API adapter with loading/error/empty states preserved."

