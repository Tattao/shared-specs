graph:
  id: aof-product-wave1-task-graph-v1
  status: product_wave1_active
  date: "2026-04-30"
  purpose: "Convert the AOF complete-product plan into executable product-code waves that can run continuously under guarded autonomy."
  product_source_of_truth:
    - ../osmx/docs/plans/93-autonomic-operations-fabric-40-day-mvp-task-pack.md
    - ../osmx/docs/plans/94-autonomic-operations-fabric-architecture-technology-upgrade-plan.md
    - ../osmx/docs/plans/95-autonomic-operations-fabric-full-product-shape-and-pilot-mvp-plan.md
    - ../osmx/docs/plans/96-codex-7x24-autonomous-delivery-operating-model.md
  execution_source_of_truth:
    - infrastructure/task-queue-v2.yaml
    - infrastructure/product-wave1-task-pack.md
    - infrastructure/product-wave1-owner-gate.md
  hard_limits:
    owner_gate_required_before_product_code: true
    auto_merge: forbidden
    production_environment_changes: forbidden
    destructive_git_commands: forbidden
    shared_specs_runtime_dependency: forbidden
    hermes_product_code_write: forbidden

waves:
  - id: PRODUCT-WAVE1
    name: Product skeleton and core contract wave
    status: active
    timebox: 48-72h after Owner approval
    goal: "Create the first usable complete-product skeleton across shell, contracts, twin, telemetry, alert, AgentOps, governance, and WP12 evidence without deep scenario implementation."
    allowed_repos:
      - ../osmx
      - shared-specs
    forbidden_repos:
      - production environments
    exit_gate:
      - all tasks have changed-files, validation, residual-risks, handoff
      - no product-code task starts without clean worktree preflight
      - no merge, release, or production operation
      - owner reviews wave summary before next product wave

task_defaults:
  status: ready_after_owner_gate
  owner: Codex
  validation_minimum:
    - git diff --check
    - targeted tests or build checks for touched area
    - artifact handoff under shared-specs
  required_artifacts:
    - changed-files.txt
    - validation.md
    - residual-risks.md
    - handoff.md

