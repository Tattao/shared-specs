  updated_at: 2026-04-30T15:20:00+08:00
  mode: codex_first_guarded_autonomy
  stage: stage_b_wave0_supervised
  source_of_truth: osmx/docs/plans
  source_docs:
    - osmx/docs/plans/90-agent-execution-operating-model.md
    - osmx/docs/plans/93-autonomic-operations-fabric-40-day-mvp-task-pack.md
    - osmx/docs/plans/94-autonomic-operations-fabric-architecture-technology-upgrade-plan.md
    - osmx/docs/plans/95-autonomic-operations-fabric-full-product-shape-and-pilot-mvp-plan.md
    - osmx/docs/plans/96-codex-7x24-autonomous-delivery-operating-model.md
  workspace:
    root_env: OSMX_WORKSPACE_ROOT
    osmx_repo_env: OSMX_REPO
    shared_specs_repo_env: SHARED_SPECS_REPO
    artifact_root_env: OSMX_ARTIFACT_ROOT
  hard_limits:
    shared_specs_runtime_dependency: forbidden
    osmx_source_of_truth_override: forbidden
    self_approval: forbidden
    auto_merge: forbidden
    destructive_git_commands: forbidden
    production_environment_changes: forbidden
  status_flow:
    - draft
    - ready
    - dispatched
    - running
    - self_validation
    - evaluation_in_progress
    - fix_required
    - owner_decision
    - ready_for_pr
    - ready_for_merge
    - merged
    - closed
  exception_status:
    - blocked
    - failed
    - stale
    - conflict
    - gate_failed
    - human_gate_required
    - security_hold

task_schema:
  id: unique task identifier
  lane: delivery lane
  title: short title
  priority: P0 | P1 | P2
  status: draft | ready | dispatched | running | self_validation | evaluation_in_progress | fix_required | owner_decision | ready_for_pr | ready_for_merge | merged | closed | blocked | failed | stale | conflict | gate_failed | human_gate_required | security_hold
  agent_profile: profile from agent-pool-v2.yaml
  source_docs: canonical input documents
  worktree: environment-expanded target path
  branch: branch name
  write_scope: allowed paths
  forbidden_scope: forbidden paths
  dependencies: upstream task ids
  blocks: downstream task ids
  human_gate: none | architecture | security | legal | release | db_migration | product_scope
  validation: validation commands or gate names
  artifacts: expected evidence files
  lease_owner: current owner, null when unleased
  lease_expires_at: ISO8601 or null
  heartbeat_at: ISO8601 or null
  attempts: integer
  max_attempts: integer

